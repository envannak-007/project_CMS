<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<style>
    *{
        padding:0;
        margin:0;
        box-sizing:border-box;
    }
    .back{
        position:absolute; 
        top:15px;
        left:15px;
        font-size:20px;
        text-decoration: none;
        color: black;
    }

    .container{
        width:100%;
        height:100vh;
        display:grid;
        place-content:center;
    }
    .container1{
        width:720px;
        height:500px;
        display:flex;
        justify-content:center;
        align-items:center;
        box-shadow:2px 2px 10px;
        border-radius:10px;
        overflow:hidden;
        transition: all .3s linear;
    }
    #toggle{
        display:none;
    }
    .form1,.form2{
        width:50%;
        height:100%;
        padding:0 35px;
        position:relative;
    }
    .login{
        position:absolute;
        width:100%;
        height:100%;
        background:rgb(22, 39, 136);
        border-radius:0 30% 30% 0;
        padding-top:180px;
        left:0;
        
        transition:0.5s ease-in-out;
    }
    .register{
        position:absolute;
        width:100%;
        height:100%;
        background:rgb(22, 39, 136);
        border-radius:30% 0 0 30%;
        padding-top:180px;
        right:0;
        transform:translateX(100%);
       transition:0.5s ease-in-out;
    }
    #toggle:checked ~ .container1 .login{    
        transform:translateX(-100%);
    }
    #toggle:checked ~ .container1 .register{
        transform:translateX(0%);
    }
    @media (max-width: 768px){

    .container1{
        width: 100%;
        height: auto;
        flex-direction: column;
    }
    .form1, .form2{
        width: 100%;
        padding-bottom: 20px;
    }
    .form1{
        display: none;
    }
    #toggle:checked ~ .container1 .form1{
        display: block;
    }
    #toggle:checked ~ .container1 .form2{
        display: none;
    }
    .login,
    .register{
        display: none;
    }
}
    
</style>
</head>
<body>
    <a class="back" href="cms.html">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back home</span>
    </a>
    <div class="container">   
    <input type="checkbox" id="toggle">
        <div class="container1">
            <div class="form1">
                <div class="login ">
                    <center>
                        <h2 class="text-light">Welcome Back</h2>
                        <p class="text-light">Don't have an account</p>
                        <label for="toggle" class="btn btn-outline-primary text-light border-2 w-50 rounded-pill">Login</label>
                    </center>
                </div>
                <h2 class="text-center mt-2">Form Register</h2>
                <form action="" >
                    <div class="form-group mt-4">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Full Name">
                    </div>
                    <div class="form-group mt-2">
                        <select class="form-control">
                            <option selected disabled>Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="form-group mt-2">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="example@gmail.com">
                    </div>

                    <div class="form-group mt-2">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="Password">
                    </div>

                    <div class="form-group mt-2">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </div>

                    <div class="form-group mt-2">
                        <button class="btn form-control btn-primary">Register</button>
                    </div>
                    <div class="form-group mt-2">
                        <span>Already have an account?<label for="toggle" style="color:blue; cursor:pointer;">  Login</label></span>
                    </div>
                </form>
            </div>
            <div class="form2">
                <div class="register">
                    <center>
                        <h2 class="text-light">Hello, Welcome </h2>
                        <p class="text-light">Already have account</p>
                        <label for="toggle" class="btn btn-outline-primary text-light border-2 w-50 rounded-pill">Register</label>
                    </center>
                </div>
                <center>
                    <img class="mt-4"
                    style="width:90px;height:70px;;"
                    src="./image/logoMe.png">
                </center>
                <h2 class="text-center mt-">Login</h2>
                <form  action="">

                    <div class="form-group mt-5">
                        <input type="email" class="form-control" placeholder="example@gmail.com">
                    </div>

                    <div class="form-group mt-3">
                        <input type="password" class="form-control" placeholder="password">
                    </div>

                    <div class="form-group mt-5">
                        <button class="btn btn-primary w-100">Login</button>
                    </div>
                    <div class="form-group mt-3">
                        <span>Don't have an account?<label for="toggle" style="color:blue; cursor:pointer;">  Register</label></span>
                    </div>
                    <div class="form-group mt-3 text-center">
                        <a style="text-decoration:none;color:rgb(201,188,188);" href="#">forgot password ?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
