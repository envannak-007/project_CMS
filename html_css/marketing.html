<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business of Combidia - Latest News</title>
    <link rel="stylesheet" href="cms_style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <!-- Header + Navbar -->
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
            <div class="container">
                <a class="navbar-brand" href="#"><img class="logoMe" src="./image/logoMe.png" alt=""></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 navBar">
                        <form class="d-flex me-3" role="search">
                            <input class="form-control rounded-5" type="search" placeholder="Search" />
                        </form>
                        <li class="nav-item navBarItem"><a class="nav-link active" href="cms.html">Home</a></li>
                        <li class="nav-item navBarItem"><a class="nav-link" href="latestNews.html">Latest News</a></li>
                        <li class="nav-item navBarItem"><a class="nav-link" href="business.html">Business</a></li>
                        <li class="nav-item navBarItem"><a class="nav-link" href="marketing.html">Marketing</a></li>
                        <li class="nav-item dropdown navBarItem">
                            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Contact</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Facebook</a></li>
                                <li><a class="dropdown-item" href="#">Email</a></li>
                                <li><a class="dropdown-item" href="#">Telegram</a></li>
                            </ul>
                        </li>
                        <li class="nav-item bg-primary navBarItem"><a class="nav-link text-light"
                                href="form.html">Login</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="mt-5 pt-4">
        <!-- Banner -->
        <div class="container mt-3">
            <div id="carouselExampleIndicators" class="carousel slide">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0"
                        class="active"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
                </div>
                <div class="carousel-inner">
                    <div class="carousel-item active"><img src="image/banner.png" class="d-block w-100" alt=""></div>
                    <div class="carousel-item"><img src="image/banner2.png" class="d-block w-100" alt=""></div>
                    <div class="carousel-item"><img src="image/banner1.png" class="d-block w-100" alt=""></div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>

        <!-- Card Section -->
        <div class="d-flex justify-content-center align-items-center gap-3 mt-4">
            <hr class="w-25">
            <h3 class="m-0"> ទីផ្សា​ ជាតិ-អន្តរជាតិ</h3>
            <hr class="w-25">
        </div>
        <div class="container mt-4">
            <div class="row" id="cardContainer"></div>
        </div>
</main>
        <script>
            fetch("data.json")
                .then(res => res.json())
                .then(data => {
                    let container = document.getElementById("cardContainer");

                    let dataMarketing = data.filter(item => item.category === "Marketing");

                    dataMarketing.forEach(item => {
                        container.innerHTML += ` 
                            <div class="col-12 col-md-6 col-lg-4 col-xl-3 mb-4">
                            <a href="details.html?id=${item.id}" class="text-decoration-none">
                                <div class="card h-100 cardall">
                                <img src="${item.img}" class="card-img-top img-fluid cardImg" alt="">
                                    <div class="card-body d-flex flex-column">
                                        <span class="border rounded-3 fs-6 w-50 p-1 mb-2">${item.btn}</span>
                                        <h5 class="card-title fs-4" id ="titleHead">${item.title}</h5>
                                        <p class="card-text fs-5" id ="text">${item.desc}...</p>
                                    </div>
                                    </div>
                                </a>
                            
                        </div>
                        ` ;
                    });
                });
        </script>

    
</body>

</html>
